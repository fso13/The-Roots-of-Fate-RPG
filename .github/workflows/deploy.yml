# GitHub Pages: статический сайт из rpg/*.md (аналог .gitlab-ci.yml)
name: pages

on:
  push:
    branches: [main, master]

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # Отключаем Jekyll, чтобы GitHub Pages отдавал статику как есть
      - run: touch public/.nojekyll

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
